name: Relatório Diário de Sinistros

on:
  # Todo dia às 09h BRT (12h UTC)
  schedule:
    - cron: '0 12 * * *'

  # Permite disparar manualmente pelo GitHub (aba Actions → Run workflow)
  workflow_dispatch:

jobs:
  coletar-e-enviar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar relatório diário
        env:
          EMAIL_CAIXA:          ${{ secrets.EMAIL_CAIXA }}
          APP_PASSWORD:         ${{ secrets.APP_PASSWORD }}
          ASSUNTO_FILTRO:       ${{ secrets.ASSUNTO_FILTRO }}
          REMETENTE_FILTRO:     ${{ secrets.REMETENTE_FILTRO }}
          GSHEET_CREDENTIALS:   ${{ secrets.GSHEET_CREDENTIALS }}
          GSHEET_ID:            ${{ secrets.GSHEET_ID }}
        run: python relatorio_diario.py
