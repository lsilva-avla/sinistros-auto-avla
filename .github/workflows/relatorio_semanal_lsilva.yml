name: Relatório Semanal de Sinistros — lsilva

on:
  schedule:
    - cron: '0 11 * * 5'
  workflow_dispatch:

jobs:
  coletar-e-enviar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar coletor — envio para lsilva
        env:
          EMAIL_CAIXA:      ${{ secrets.EMAIL_CAIXA }}
          APP_PASSWORD:     ${{ secrets.APP_PASSWORD }}
          REMETENTE_FILTRO: ${{ secrets.REMETENTE_FILTRO }}
          EMAIL_DESTINO:    lsilva@avla.com
        run: python coletor_sinistros.py
