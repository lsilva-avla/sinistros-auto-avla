name: Relatório Semanal de Sinistros

on:
  # Toda sexta-feira às 08:00 BRT (11:00 UTC)
  schedule:
    - cron: '0 11 * * 5'

  # Permite executar manualmente pelo GitHub (aba Actions → Run workflow)
  workflow_dispatch:

jobs:
  coletar-e-enviar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar coletor semanal de sinistros
        env:
          EMAIL_CAIXA:      ${{ secrets.EMAIL_CAIXA }}
          APP_PASSWORD:     ${{ secrets.APP_PASSWORD }}
          REMETENTE_FILTRO: ${{ secrets.REMETENTE_FILTRO }}
          EMAIL_DESTINO:    ${{ secrets.EMAIL_DESTINO }}
        run: python coletor_sinistros.py
